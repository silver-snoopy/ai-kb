name: Deploy Quartz site

on:
  push:
    branches: [main]
    paths-ignore:
      - 'dashboard.md'          # avoid loop with dashboard workflow
      - '_lint/**'
      - '.github/**'
      - 'docs/**'
      - 'raw/**'                # Quartz ignores these anyway
      - 'MEMORY.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  # Cancel in-flight builds when a newer push arrives — prevents multiple
  # stacked artifacts colliding at the deploy step (actions/deploy-pages@v4
  # fails when it finds more than one github-pages artifact in a run group).
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz deps
        working-directory: quartz
        run: npm ci

      - name: Build site
        working-directory: quartz
        run: npm run build:vault   # defined in quartz/package.json (Task 4.1 step 4)

      - name: Build question bank for practice + review apps
        run: |
          cd scripts && npm ci && cd ..
          node scripts/build-questions.mjs

      - name: Install game deps
        working-directory: public/dungeon
        run: npm ci

      - name: Build game bundle
        working-directory: public/dungeon
        run: npm run build

      - name: Copy static apps into Quartz output
        # public/ at repo root contains the vanilla JS practice + review apps and
        # the generated questions.json. Merge them into quartz/public/ so GitHub
        # Pages serves /practice/, /review/, /index.html, /questions.json alongside
        # the Quartz-rendered vault pages.
        # NOTE: this also copies public/dungeon/ (Vite source) — the game dist
        # merge step below immediately wipes and replaces quartz/public/dungeon/
        # with the compiled bundle, so the source copy never survives to production.
        run: |
          set -e
          cp -r public/. quartz/public/
          test -f quartz/public/questions.json
          test -f quartz/public/practice/index.html
          test -f quartz/public/review/index.html
          ls -la quartz/public/practice quartz/public/review quartz/public/questions.json

      - name: Merge game dist into Quartz output
        # Runs AFTER the static overlay so the compiled bundle overwrites the Vite
        # source public/dungeon/ that was copied above. The rm -rf guarantees no
        # stale source files (e.g. index.html pointing at /src/main.ts) survive.
        run: |
          set -e
          rm -rf quartz/public/dungeon
          mkdir -p quartz/public/dungeon
          cp -r public/dungeon/dist/. quartz/public/dungeon/
          # Overlay freshly built questions.json from the vault so the game
          # always has the latest compiled questions (not the snapshot that
          # may be stale in the repo copy)
          mkdir -p quartz/public/dungeon/data
          cp public/questions.json quartz/public/dungeon/data/questions.json
          echo "Game deployed to /dungeon/. Contents:"
          ls quartz/public/dungeon/ | head -20
          test -f quartz/public/dungeon/index.html || { echo "FAIL: game index.html missing"; exit 1; }
          test -f quartz/public/dungeon/data/questions.json || { echo "FAIL: questions.json missing"; exit 1; }

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
