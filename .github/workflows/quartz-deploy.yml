name: Deploy Quartz site

on:
  push:
    branches: [main]
    paths-ignore:
      - 'dashboard.md'          # avoid loop with dashboard workflow
      - '_lint/**'
      - '.github/**'
      - 'docs/**'
      - 'raw/**'                # Quartz ignores these anyway
      - 'MEMORY.md'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  # Cancel in-flight builds when a newer push arrives — prevents multiple
  # stacked artifacts colliding at the deploy step (actions/deploy-pages@v4
  # fails when it finds more than one github-pages artifact in a run group).
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz deps
        working-directory: quartz
        run: npm ci

      - name: Build site
        working-directory: quartz
        run: npm run build:vault   # defined in quartz/package.json (Task 4.1 step 4)

      - name: Build question bank for practice + review apps
        run: |
          cd scripts && npm ci && cd ..
          node scripts/build-questions.mjs

      - name: Copy static apps into Quartz output
        # public/ at repo root contains the vanilla JS practice + review apps and
        # the generated questions.json. Merge them into quartz/public/ so GitHub
        # Pages serves /practice/, /review/, /index.html, /questions.json alongside
        # the Quartz-rendered vault pages.
        run: |
          set -e
          cp -r public/. quartz/public/
          test -f quartz/public/questions.json
          test -f quartz/public/practice/index.html
          test -f quartz/public/review/index.html
          ls -la quartz/public/practice quartz/public/review quartz/public/questions.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
